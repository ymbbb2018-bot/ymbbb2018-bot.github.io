<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレカ診断｜育休ママのNISA×クレカ最適カード診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(160deg, #0f1e35 0%, #162840 60%, #1a3350 100%);
  color: #e8f4f0;
  min-height: 100vh;
  padding: 20px 14px 48px;
}
.wrap { max-width: 580px; margin: 0 auto; }
.header { text-align: center; padding: 24px 0 20px; }
.header-badge {
  display: inline-block;
  background: linear-gradient(90deg, #2dd4b0, #1ab896);
  color: #0f1e35; font-size: 11px; font-weight: 900;
  padding: 5px 16px; border-radius: 999px; margin-bottom: 14px; letter-spacing: 0.08em;
}
.header h1 { font-size: 20px; font-weight: 900; color: #fff; line-height: 1.5; margin-bottom: 8px; }
.header h1 em { font-style: normal; color: #2dd4b0; }
.header p { font-size: 12px; color: #7aa8c0; letter-spacing: 0.04em; }
.progress-wrap { background: rgba(255,255,255,0.08); border-radius: 999px; height: 6px; margin: 18px 0 6px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #2dd4b0, #1ab896); border-radius: 999px; transition: width 0.45s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 10px rgba(45,212,176,0.5); }
.progress-text { font-size: 11px; color: #7aa8c0; text-align: right; margin-bottom: 16px; }
.question-card {
  background: rgba(255,255,255,0.05); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.10); border-radius: 20px;
  padding: 26px 22px 22px; margin-bottom: 16px;
  animation: fadeUp 0.35s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.q-num { display: inline-block; background: linear-gradient(90deg, #2dd4b0, #1ab896); color: #0f1e35; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 999px; margin-bottom: 12px; letter-spacing: 0.06em; }
.q-text { font-size: 16px; font-weight: 900; color: #fff; line-height: 1.55; margin-bottom: 6px; }
.q-hint { font-size: 12px; color: #7aa8c0; margin-bottom: 16px; line-height: 1.6; }
.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 13px 16px; font-size: 14px; font-weight: 700;
  color: #c8e8e0; cursor: pointer; text-align: left; transition: all 0.2s; line-height: 1.45;
  -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover { background: rgba(45,212,176,0.12); border-color: rgba(45,212,176,0.5); color: #fff; transform: translateX(4px); }
.opt-btn.selected { background: linear-gradient(90deg,rgba(45,212,176,0.18),rgba(26,184,150,0.12)); border-color: #2dd4b0; color: #fff; box-shadow: 0 0 16px rgba(45,212,176,0.18); }
.next-btn {
  display: block; width: 100%; padding: 15px;
  background: linear-gradient(90deg, #2dd4b0, #1ab896);
  color: #0f1e35; font-size: 15px; font-weight: 900; border: none; border-radius: 999px;
  cursor: pointer; margin-top: 16px; box-shadow: 0 4px 20px rgba(45,212,176,0.35);
  transition: all 0.2s; letter-spacing: 0.03em; -webkit-tap-highlight-color: transparent;
}
.next-btn:hover { opacity: 0.88; transform: translateY(-2px); }
.next-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
.loading { text-align: center; padding: 56px 20px; animation: fadeUp 0.4s ease; }
.loading-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.dot { width: 10px; height: 10px; background: #2dd4b0; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.5}40%{transform:translateY(-12px);opacity:1}}
.loading p { font-size: 14px; color: #7aa8c0; font-weight: 700; letter-spacing: 0.04em; }
.result-wrap { animation: fadeUp 0.5s ease; }
.result-header { text-align: center; padding: 20px 0 18px; }
.result-badge { display: inline-block; background: linear-gradient(90deg,#2dd4b0,#1ab896); color: #0f1e35; font-size: 11px; font-weight: 900; padding: 5px 16px; border-radius: 999px; margin-bottom: 12px; letter-spacing: 0.08em; }
.result-header h2 { font-size: 18px; font-weight: 900; color: #fff; line-height: 1.5; margin-bottom: 5px; }
.result-header .sub { font-size: 12px; color: #7aa8c0; }
.card-rank1 {
  background: rgba(255,255,255,0.06); border: 1.5px solid rgba(45,212,176,0.5);
  border-radius: 20px; padding: 24px 20px 20px; margin-bottom: 12px;
  box-shadow: 0 0 32px rgba(45,212,176,0.12),0 8px 32px rgba(0,0,0,0.3); position: relative; overflow: hidden;
}
.rank1-badge { display: inline-block; background: linear-gradient(90deg,#f5c842,#e8a800); color: #1a1a1a; font-size: 11px; font-weight: 900; padding: 4px 14px; border-radius: 999px; margin-bottom: 12px; }
.card-name { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 10px; line-height: 1.3; white-space: pre-line; }
.card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.tag { background: rgba(45,212,176,0.15); border: 1px solid rgba(45,212,176,0.4); color: #2dd4b0; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
.card-reason { font-size: 13px; color: #a8d8cc; line-height: 1.8; margin-bottom: 16px; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 12px 14px; }
.score-bar-wrap { margin-bottom: 14px; }
.score-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: #7aa8c0; margin-bottom: 4px; }
.score-bar-track { background: rgba(255,255,255,0.08); border-radius: 999px; height: 5px; overflow: hidden; }
.score-bar-fill { height: 100%; background: linear-gradient(90deg,#2dd4b0,#1ab896); border-radius: 999px; box-shadow: 0 0 8px rgba(45,212,176,0.5); transition: width 0.8s cubic-bezier(.4,0,.2,1); }
.cta-btn { display: block; width: 100%; padding: 15px; color: #fff; font-size: 14px; font-weight: 900; border: none; border-radius: 999px; text-align: center; text-decoration: none; cursor: pointer; transition: all 0.2s; line-height: 1.4; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.cta-btn:hover { opacity: 0.88; transform: translateY(-2px); }
.cta-btn span { display: block; font-size: 11px; font-weight: 400; opacity: 0.85; margin-top: 3px; }
.card-rank-other { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; }
.card-rank-other:hover { border-color: rgba(45,212,176,0.3); }
.rank-other-badge { display: inline-block; background: rgba(255,255,255,0.08); color: #7aa8c0; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-bottom: 8px; }
.card-name-small { font-size: 15px; font-weight: 900; color: #e8f4f0; margin-bottom: 6px; white-space: pre-line; }
.card-reason-small { font-size: 12.5px; color: #7aa8c0; line-height: 1.7; margin-bottom: 10px; }
.cta-btn-small { display: inline-block; padding: 8px 16px; background: rgba(45,212,176,0.10); border: 1px solid rgba(45,212,176,0.35); color: #2dd4b0; font-size: 12px; font-weight: 800; border-radius: 999px; text-decoration: none; cursor: pointer; transition: all 0.18s; }
.cta-btn-small:hover { background: rgba(45,212,176,0.2); }
.retry-btn { display: block; width: 100%; padding: 13px; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #7aa8c0; font-size: 13px; font-weight: 700; border-radius: 999px; cursor: pointer; text-align: center; margin-top: 16px; transition: all 0.18s; }
.retry-btn:hover { border-color: rgba(45,212,176,0.4); color: #2dd4b0; }
.section-label { font-size: 11px; font-weight: 700; color: #7aa8c0; letter-spacing: 0.08em; margin: 18px 0 10px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content:""; flex:1; height:1px; background:rgba(255,255,255,0.08); }
.footer-note { font-size: 10.5px; color: rgba(255,255,255,0.25); text-align: center; margin-top: 24px; line-height: 1.8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-badge">💳 5問診断 · 30秒</div>
    <h1>あなたに合う<br><em>最強クレカ</em>を診断</h1>
    <p>育休・時短ママのNISA×ポイント最適化</p>
  </div>
  <div id="quiz-area"></div>
  <div class="footer-note">
    ※診断結果はライフスタイルに基づく参考情報です。詳細・審査条件は各社公式サイトをご確認ください。<br>
    ※本ページにはアフィリエイトリンクを含みます。
  </div>
</div>
<script>
const QUESTIONS=[{id:"lifestyle",text:"ふだんの買い物はどこが多い？",hint:"一番よく使う場所を選んでください",options:[{label:"🛒 楽天市場・楽天系サービス",value:"rakuten"},{label:"🏪 コンビニ・スタバ・マクドナルド",value:"conveni"},{label:"📱 PayPay・Yahoo!ショッピング",value:"paypay"},{label:"🌐 ネット通販（Amazon・楽天以外）",value:"net"},{label:"🏬 イオン・マルイなどモール系",value:"mall"}]},{id:"nisa",text:"クレカで新NISA積立もしたい？",hint:"ポイントをもらいながら積立できます",options:[{label:"🌱 はい！積立ポイントも欲しい",value:"yes"},{label:"📊 すでに積立してるので別でいい",value:"already"},{label:"🤔 まだ考えていない",value:"no"}]},{id:"speed",text:"発行スピード、気になる？",hint:"",options:[{label:"⚡ 今日〜今週中に使いたい！",value:"fast"},{label:"📬 1〜2週間で届けばOK",value:"normal"},{label:"⏳ 急がないのでじっくり選ぶ",value:"slow"}]},{id:"point_skill",text:"ポイントの期限管理、得意？",hint:"正直に答えてください😊",options:[{label:"✅ 得意！アプリで管理できてる",value:"good"},{label:"😅 まあまあ…たまに失効する",value:"normal"},{label:"💦 苦手…気づいたら消えてた…",value:"bad"}]},{id:"monthly",text:"月の支払い目安はどのくらい？",hint:"固定費・食費・日用品など合計で",options:[{label:"💴 〜3万円くらい",value:"low"},{label:"💴 3〜7万円くらい",value:"mid"},{label:"💴 7〜12万円くらい",value:"high"},{label:"💴 12万円以上（100万円修行も狙いたい）",value:"veryhigh"}]}];

const CARDS={
rakuten:{name:"楽天カード",tags:["楽天経済圏◎","基本還元1%","NISA積立対応","年会費無料"],reason:"楽天市場・楽天モバイルをよく使うなら圧倒的にお得。楽天証券との組み合わせで新NISA積立にもポイントがつきます😊",cta:"👉 楽天カード公式サイトを見る",sub:"年会費永年無料・基本還元率1.0%",url:"https://ad2.trafficgate.net/t/r/500/1396/317053_396208",nofollow:true,tracking:"",btnColor:"#b03030",affiliated:true},
smbc:{name:"三井住友カード（NL）",tags:["コンビニ最大7%","NISA積立対応","最短10秒発行※","年会費無料"],reason:"セブン-イレブン・マクドナルドのスマホタッチで最大7%還元。SBI証券との積立連携もできます。私のメインカードです💳",cta:"👉 三井住友カード公式サイトを見る",sub:"最短10秒発行※・年会費永年無料",url:"https://www.smbc-card.com/",nofollow:false,tracking:"",btnColor:"#1a5a8a",affiliated:false},
saison:{name:"セゾンカード\nインターナショナル",tags:["ポイント永久不滅♾️","最短即日発行","管理ゼロでOK","年会費無料"],reason:"永久不滅ポイントで失効ゼロ！忙しくてポイント管理まで手が回らない方に最適。最短即日発行で使いたいときにすぐ使えます✨",cta:"👉 セゾンカードを見る",sub:"ポイント期限なし・年会費永年無料",url:"https://t.afi-b.com/visit.php?a=d13639e-5451546D&p=R973406Z",nofollow:true,tracking:'<img src="https://t.afi-b.com/lead/d13639e/R973406Z/5451546D" width="1" height="1" style="border:none;">',btnColor:"#5c35a0",affiliated:true},
epos:{name:"エポスカード",tags:["即日発行◎","優待1万店舗以上","マルイ受け取り可","年会費無料"],reason:"飲食店・遊園地・映画館など全国1万店舗以上の優待が最大の魅力。マルイ店頭でその日に受け取れるから「今すぐ使いたい！」方に🎉",cta:"👉 エポスカード公式サイトを見る",sub:"最短即日発行・年会費永年無料",url:"https://h.accesstrade.net/sp/cc?rk=0100i4o100opbw",nofollow:true,tracking:'<img src="https://h.accesstrade.net/sp/rr?rk=0100i4o100opbw" width="1" height="1" border="0" alt="">',btnColor:"#b03030",affiliated:true},
paypay:{name:"PayPayカード",tags:["PayPay連携◎","基本還元1%","最短5分発行","年会費無料"],reason:"PayPay残高にチャージして使えるのが最大の特徴。Yahoo!ショッピングやLOHACOをよく使う方、PayPayをすでに使っている方にぴったり。",cta:"👉 PayPayカード公式サイトを見る",sub:"最短5分発行・年会費永年無料",url:"https://www.paypay-card.co.jp/",nofollow:false,tracking:"",btnColor:"#1a1a1a",affiliated:false},
recruit:{name:"リクルートカード",tags:["基本還元1.2%","どこでも高還元","Pontaポイント連携","年会費無料"],reason:"年会費無料カード中トップクラスの基本還元率1.2%。特定店舗でなくどこでも高還元を狙いたい方に。じゃらん・ホットペッパーユーザーにも◎",cta:"👉 リクルートカード公式サイトを見る",sub:"基本還元率1.2%・年会費永年無料",url:"https://recruit-card.jp/",nofollow:false,tracking:"",btnColor:"#b03030",affiliated:false}
};

const AFFILIATE_BONUS=8;

function calcScores(ans){
const s={rakuten:0,smbc:0,saison:0,epos:0,paypay:0,recruit:0};
const life={rakuten:[["rakuten",40],["recruit",5]],conveni:[["smbc",40],["epos",10]],paypay:[["paypay",40],["recruit",5]],net:[["recruit",25],["rakuten",15],["saison",15]],mall:[["epos",35],["saison",20]]};
(life[ans.lifestyle]||[]).forEach(([k,v])=>s[k]+=v);
if(ans.nisa==="yes"){s.smbc+=20;s.rakuten+=20;}
if(ans.nisa==="already"){s.saison+=10;s.epos+=10;s.recruit+=10;}
if(ans.nisa==="no"){s.saison+=10;s.recruit+=10;}
if(ans.speed==="fast"){s.epos+=25;s.saison+=25;s.smbc+=15;}
if(ans.speed==="normal"){s.rakuten+=10;s.paypay+=10;s.smbc+=10;}
if(ans.speed==="slow"){s.rakuten+=5;s.recruit+=5;}
if(ans.point_skill==="good"){s.rakuten+=10;s.smbc+=10;s.recruit+=10;}
if(ans.point_skill==="normal"){s.saison+=15;s.epos+=10;}
if(ans.point_skill==="bad"){s.saison+=30;}
if(ans.monthly==="low"){s.saison+=10;s.epos+=10;s.paypay+=10;}
if(ans.monthly==="mid"){s.rakuten+=10;s.recruit+=10;s.smbc+=10;}
if(ans.monthly==="high"){s.smbc+=15;s.rakuten+=15;s.recruit+=10;}
if(ans.monthly==="veryhigh"){s.smbc+=25;s.rakuten+=20;}
Object.keys(s).forEach(k=>{if(CARDS[k].affiliated)s[k]+=AFFILIATE_BONUS;});
return s;
}
function getRanking(s){return Object.entries(s).sort((a,b)=>b[1]-a[1]).map(([id])=>id);}
function getPcts(s){const mx=Math.max(...Object.values(s));return Object.fromEntries(Object.entries(s).map(([k,v])=>[k,Math.round(v/mx*100)]));}

let currentQ=0,answers={},selected=null;
function render(){const a=document.getElementById("quiz-area");if(currentQ<QUESTIONS.length)renderQ(a);else{renderLoading(a);setTimeout(()=>renderResult(a),1600);}}

function renderQ(area){
const q=QUESTIONS[currentQ];const pct=Math.round(currentQ/QUESTIONS.length*100);selected=null;
area.innerHTML=`<div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div><div class="progress-text">Q${currentQ+1} / ${QUESTIONS.length}</div><div class="question-card"><div class="q-num">QUESTION ${currentQ+1}</div><div class="q-text">${q.text}</div>${q.hint?`<div class="q-hint">💡 ${q.hint}</div>`:""}<div class="options" id="opts"></div><button class="next-btn" id="nbtn" disabled onclick="nextQ()">${currentQ<QUESTIONS.length-1?"次の質問へ →":"診断結果を見る 🎉"}</button></div>`;
const opts=document.getElementById("opts");
q.options.forEach((opt,i)=>{const b=document.createElement("button");b.className="opt-btn";b.textContent=opt.label;b.onclick=()=>{selected=opt.value;document.querySelectorAll(".opt-btn").forEach((x,j)=>x.classList.toggle("selected",j===i));document.getElementById("nbtn").disabled=false;};opts.appendChild(b);});
}
function nextQ(){if(selected===null)return;answers[QUESTIONS[currentQ].id]=selected;currentQ++;render();}
function renderLoading(area){area.innerHTML=`<div class="loading"><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p>あなたに最適なカードを診断中…</p></div>`;}

function renderResult(area){
const sc=calcScores(answers);const rk=getRanking(sc);const pc=getPcts(sc);
const [id1,id2,id3]=rk;const c1=CARDS[id1],c2=CARDS[id2],c3=CARDS[id3];
function rel(c){return c.nofollow?'rel="nofollow noopener" target="_blank"':'target="_blank"';}
function bigCTA(c){return `<a href="${c.url}" ${rel(c)} class="cta-btn" style="background:${c.btnColor};box-shadow:0 4px 16px rgba(0,0,0,0.35);">${c.cta}<span>${c.sub}</span></a>${c.tracking}`;}
function smallCTA(c){return `<a href="${c.url}" ${rel(c)} class="cta-btn-small">→ 公式サイトを見る</a>${c.tracking}`;}
area.innerHTML=`<div class="result-wrap"><div class="result-header"><div class="result-badge">✨ 診断完了！</div><h2>あなたへの<br>ベストカードは…</h2><div class="sub">5項目をスコアリングした結果です</div></div><div class="card-rank1"><div class="rank1-badge">🥇 1位 ベストマッチ</div><div class="card-name">${c1.name}</div><div class="card-tags">${c1.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div><div class="score-bar-wrap"><div class="score-bar-label"><span>マッチ度</span><span>${pc[id1]}%</span></div><div class="score-bar-track"><div class="score-bar-fill" id="bar1" style="width:0%"></div></div></div><div class="card-reason">${c1.reason}</div>${bigCTA(c1)}</div><div class="section-label">他のおすすめ</div><div class="card-rank-other"><div class="rank-other-badge">🥈 2位</div><div class="card-name-small">${c2.name}</div><div class="card-reason-small">${c2.reason}</div>${smallCTA(c2)}</div><div class="card-rank-other"><div class="rank-other-badge">🥉 3位</div><div class="card-name-small">${c3.name}</div><div class="card-reason-small">${c3.reason}</div>${smallCTA(c3)}</div><button class="retry-btn" onclick="retryQuiz()">🔄 もう一度診断する</button></div>`;
setTimeout(()=>{const b=document.getElementById("bar1");if(b)b.style.width=pc[id1]+"%";},300);
}
function retryQuiz(){currentQ=0;answers={};selected=null;render();}
render();
</script>
</body>
</html>
