    matsui: '操作に不安があれば松井証券のサポートも頼りになります。困ったらすぐ電話できます',
    gmo:    'シンプル積立に特化したいGMOクリック証券。余計な機能なくすっきり使えます',
  },
  gmo: {
    rakuten:'楽天ポイントを活かしたいなら楽天証券も検討を。楽天カードと組み合わせれば設定が少なく完結します',
    sbi:    '長期投資・幅広い商品を使いたいならSBI証券が業界最大手で安心感があります',
    monex:  'dポイントをお持ちならマネックス証券の還元率1.1%もコツコツお得になります',
    matsui: 'サポート充実の松井証券も初心者ママにおすすめ。電話でいつでも相談できます',
  },
};

// =============================================
// アプリ状態
// =============================================
let currentQ = 0;
let answers  = [];   // 各質問で選んだvalue
let selected = null; // 現在選択中

// =============================================
// 描画
// =============================================
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  selected = null;

  document.getElementById('qBadge').textContent  = `QUESTION ${currentQ + 1}`;
  document.getElementById('qText').textContent   = q.text;
  document.getElementById('qHint').textContent   = q.hint;
  document.getElementById('progressFill').style.width  = `${((currentQ + 1) / 5) * 100}%`;
  document.getElementById('progressLabel').textContent = `Q${currentQ + 1} / 5`;

  const nextBtn   = document.getElementById('nextBtn');
  const isLastQ   = currentQ === QUESTIONS.length - 1;
  nextBtn.textContent = isLastQ ? '診断結果を見る 🎉' : '次の質問へ →';
  nextBtn.disabled    = true;

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.textContent = c.label;
    btn.addEventListener('click', () => selectChoice(i, c.value, btn));
    wrap.appendChild(btn);
  });

  // フェードアニメ
  const card = document.getElementById('questionCard');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function selectChoice(idx, value, btnEl) {
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  selected = value;
  document.getElementById('nextBtn').disabled = false;
}

function goNext() {
  if (selected === null) return;
  answers.push(selected);

  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showLoading();
  }
}

// =============================================
// ローディング→結果
// =============================================
function showLoading() {
  document.getElementById('questionCard').style.display  = 'none';
  document.getElementById('progressWrap').style.display  = 'none';
  document.getElementById('loadingScreen').style.display = 'block';

  setTimeout(showResult, 1800);
}

function calcResult() {
  // スコア集計
  const score = { rakuten: 0, monex: 0, matsui: 0, gmo: 0, sbi: 0 };
  answers.forEach(v => { if (score[v] !== undefined) score[v]++; });

  // 同点時はRANK_ORDERで優先度決定
  const sorted = RANK_ORDER.slice().sort((a, b) => {
    if (score[b] !== score[a]) return score[b] - score[a];
    return RANK_ORDER.indexOf(a) - RANK_ORDER.indexOf(b);
  });
  return sorted; // 1位〜5位
}

function showResult() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('progressWrap').style.display  = 'none';

  const ranked = calcResult();
  const first  = ranked[0];
  const second = ranked[1];
  const third  = ranked[2];

  const b1 = BROKERS[first];
  const b2 = BROKERS[second];
  const b3 = BROKERS[third];

  const desc2 = (OTHERS_DESC[first] && OTHERS_DESC[first][second]) || b2.desc.slice(0, 50) + '…';
  const desc3 = (OTHERS_DESC[first] && OTHERS_DESC[first][third])  || b3.desc.slice(0, 50) + '…';

  const html = `
    <div class="result-header fade-in">
      <div class="result-badge">✨ 診断完了！</div>
      <div class="result-title">あなたへの<br>ベスト口座は…</div>
      <div class="result-sub">5項目をスコアリングした結果です</div>
    </div>

    <div class="result-first fade-in">
      <div class="rank-badge-1">🥇 1位 ベストマッチ</div>
      <div class="result-name">${b1.name}</div>
      <div class="result-tags">
        ${b1.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}
      </div>
      <div class="match-label">
        <span>マッチ度</span>
        <span>${b1.match}%</span>
      </div>
      <div class="match-bar-bg">
        <div class="match-bar-fill" id="matchBar1" style="width:0%"></div>
      </div>
      <div class="result-desc">${b1.desc}</div>
      <a href="${b1.ctaUrl}" target="_blank" rel="${b1.ctaRel}"
         class="result-cta-btn"
         style="background:${b1.ctaColor}">
        ${b1.ctaText}
      </a>
      <div class="result-cta-sub" style="color:#8ab8cc;">${b1.ctaSub}</div>
      ${b1.ctaPixel || ''}
    </div>

    <div class="result-others-label">他のおすすめ</div>

    <div class="result-other fade-in">
      <div class="rank-badge-other">🥈 2位</div>
      <div class="other-name">${b2.name}</div>
      <div class="other-desc">${desc2}</div>
      <a href="${b2.ctaUrl}" target="_blank" rel="${b2.ctaRel}" class="other-link">
        → 公式サイトを見る
      </a>
      ${b2.ctaPixel || ''}
    </div>

    <div class="result-other fade-in">
      <div class="rank-badge-other">🥉 3位</div>
      <div class="other-name">${b3.name}</div>
      <div class="other-desc">${desc3}</div>
      <a href="${b3.ctaUrl}" target="_blank" rel="${b3.ctaRel}" class="other-link">
        → 公式サイトを見る
      </a>
      ${b3.ctaPixel || ''}
    </div>

    <button class="retry-btn" onclick="resetDiag()">🔄 もう一度診断する</button>

    <p class="result-disclaimer">
      ※診断結果はライフスタイルに基づく参考情報です。<br>
      詳細・審査条件は各社公式サイトをご確認ください。
    </p>
  `;

  const screen = document.getElementById('resultScreen');
  screen.innerHTML = html;
  screen.style.display = 'block';

  // マッチ度バーをアニメーション
  setTimeout(() => {
    const bar = document.getElementById('matchBar1');
    if (bar) bar.style.width = b1.match + '%';
  }, 200);
}

// =============================================
// リセット
// =============================================
function resetDiag() {
  currentQ = 0;
  answers  = [];
  selected = null;

  document.getElementById('resultScreen').style.display  = 'none';
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('progressWrap').style.display  = 'block';
  document.getElementById('questionCard').style.display  = 'block';

  renderQuestion();
}

// =============================================
// イベント
// =============================================
document.getElementById('nextBtn').addEventListener('click', goNext);

// 初期描画
renderQuestion();
</script>

</body>
</html>
